name: Build and push custom Frappe CRM image

on:
  push:
    branches: [main]
    paths:
      - apps.json
      - Containerfile
      - .github/workflows/build.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/frappe-crm

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout this repo (apps.json)
        uses: actions/checkout@v4

      - name: Checkout frappe_docker (always latest)
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: frappe_docker

      # Resolves one cache-bust SHA per app (from apps.json) plus one for frappe
      # itself, so Containerfile can invalidate each app's own RUN layer
      # independently instead of busting one monolithic install-everything layer.
      # Adding an app here still requires a matching ARG block in Containerfile.
      - name: Resolve latest commit of frappe and every app (for per-layer cache busting)
        id: resolve
        run: |
          frappe_sha=$(git ls-remote https://github.com/frappe/frappe refs/heads/version-16 | cut -f1)
          echo "frappe_sha=$frappe_sha" >> "$GITHUB_OUTPUT"

          count=$(python3 -c "import json;print(len(json.load(open('apps.json'))))")
          for idx in $(seq 0 $((count - 1))); do
            name=$(python3 -c "import json;print(json.load(open('apps.json'))[$idx]['name'])")
            url=$(python3 -c "import json;print(json.load(open('apps.json'))[$idx]['url'])")
            branch=$(python3 -c "import json;print(json.load(open('apps.json'))[$idx]['branch'])")
            sha=$(git ls-remote "$url" "refs/heads/$branch" | cut -f1)
            echo "${name}_url=$url" >> "$GITHUB_OUTPUT"
            echo "${name}_branch=$branch" >> "$GITHUB_OUTPUT"
            echo "${name}_sha=$sha" >> "$GITHUB_OUTPUT"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frappe_docker
          file: Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:16
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            FRAPPE_BRANCH=version-16
            FRAPPE_CACHE_BUST=${{ steps.resolve.outputs.frappe_sha }}
            CRM_URL=${{ steps.resolve.outputs.CRM_url }}
            CRM_BRANCH=${{ steps.resolve.outputs.CRM_branch }}
            CRM_CACHE_BUST=${{ steps.resolve.outputs.CRM_sha }}
            FLOW_URL=${{ steps.resolve.outputs.FLOW_url }}
            FLOW_BRANCH=${{ steps.resolve.outputs.FLOW_branch }}
            FLOW_CACHE_BUST=${{ steps.resolve.outputs.FLOW_sha }}
            ASSISTANT_URL=${{ steps.resolve.outputs.ASSISTANT_url }}
            ASSISTANT_BRANCH=${{ steps.resolve.outputs.ASSISTANT_branch }}
            ASSISTANT_CACHE_BUST=${{ steps.resolve.outputs.ASSISTANT_sha }}
            DOCK_URL=${{ steps.resolve.outputs.DOCK_url }}
            DOCK_BRANCH=${{ steps.resolve.outputs.DOCK_branch }}
            DOCK_CACHE_BUST=${{ steps.resolve.outputs.DOCK_sha }}
            ORGA_URL=${{ steps.resolve.outputs.ORGA_url }}
            ORGA_BRANCH=${{ steps.resolve.outputs.ORGA_branch }}
            ORGA_CACHE_BUST=${{ steps.resolve.outputs.ORGA_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
